kind: wasmer.io/App.v0
name: beautyinblack
owner: amansuwl
package: amansuwl/beautyinblack

env:
  DJANGO_SETTINGS_MODULE: ecommerce.settings
  DJANGO_SECRET_KEY: "your-django-secret-key-here"
  DEBUG: "False"
  # DATABASE SETTINGS
  DB_NAME: "beauty_in_black"
