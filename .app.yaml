# app.yaml — Wasmer Edge deployment config
# Place this in your project root alongside manage.py and wasmer.toml

kind: wasmer.io/App.v0
name: beautyinblack

package: .

env:
  DJANGO_SETTINGS_MODULE: ecommerce.settings
  DEBUG: "False"
  # All sensitive keys (SECRET_KEY, DB_NAME, STRIPE_SECRET_KEY etc.)
  # must be set via the Wasmer Dashboard → App → Environment Variables
  # Do NOT put real secrets in this file

cli_args: web

domains:
  - beautyinblack.co.uk
  - www.beautyinblack.co.uk