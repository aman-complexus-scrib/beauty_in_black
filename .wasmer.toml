[package]
name = "beautyinblack"
version = "0.1.0"
description = "Beauty In Black – Django e-commerce store"

[[command]]
name = "web"
module = "python/python"
runner = "wcgi"

[command.env]
DJANGO_SETTINGS_MODULE = "ecommerce.settings"

[command.annotations]
wcgi.handler = "ecommerce.wsgi:application"